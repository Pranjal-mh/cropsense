services:
  - type: web
    name: cropsense
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: HF_INFERENCE_MODE
        value: "api"
      - key: HF_MODEL_ID
        value: "linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification"
      - key: HF_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"