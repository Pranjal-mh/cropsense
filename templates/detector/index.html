<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CropSense — AI Crop Disease Detector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f2f6f1;
    margin: 0;
    padding: 2rem 1rem;
    color: #1f2a1f;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: .25rem; }
  p.sub { color: #566; margin-top: 0; }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 1.5rem;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    margin-bottom: 1.5rem;
  }
  #drop {
    border: 2px dashed #8bbf8b;
    border-radius: 10px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    color: #3b6b3b;
  }
  #drop.dragover { background: #eaf5ea; }
  img#preview { max-width: 100%; border-radius: 10px; margin-top: 1rem; display: none; }
  button {
    background: #2e7d32;
    color: #fff;
    border: none;
    padding: .7rem 1.3rem;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 1rem;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .result { margin-top: 1rem; }
  .badge {
    display: inline-block;
    padding: .2rem .6rem;
    border-radius: 999px;
    font-size: .8rem;
    font-weight: 600;
  }
  .badge.healthy { background: #e2f5e2; color: #1b6b1b; }
  .badge.sick { background: #fdeaea; color: #b02a2a; }
  dl { display: grid; grid-template-columns: 120px 1fr; row-gap: .5rem; column-gap: .5rem; margin-top: 1rem;}
  dt { font-weight: 600; color: #445; }
  dd { margin: 0; }
  .error { color: #b02a2a; }
  footer { text-align: center; font-size: .8rem; color: #789; margin-top: 2rem; }
  code { background: #eef2ee; padding: .1rem .3rem; border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🌿 CropSense</h1>
  <p class="sub">Upload a crop leaf photo to detect disease and get a remedy.</p>

  <div class="card">
    <div id="drop">
      <p>Click to choose an image, or drag one here</p>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>
    <img id="preview" alt="preview">
    <button id="analyzeBtn" disabled>Analyze Leaf</button>
    <div id="result" class="result"></div>
  </div>

  <footer>
    REST API also available at <code>POST /api/detect/</code> —
    see the <a href="/api/diseases/">disease knowledge base</a> and
    <a href="/api/history/">detection history</a>.
  </footer>
</div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const analyzeBtn = document.getElementById('analyzeBtn');
const resultDiv = document.getElementById('result');
let selectedFile = null;

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', (e) => {
  e.preventDefault();
  drop.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  analyzeBtn.disabled = false;
  resultDiv.innerHTML = '';
}

analyzeBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  analyzeBtn.disabled = true;
  analyzeBtn.textContent = 'Analyzing…';
  resultDiv.innerHTML = '';

  const formData = new FormData();
  formData.append('image', selectedFile);

  try {
    const res = await fetch('/api/detect/', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Something went wrong.');
    renderResult(data);
  } catch (err) {
    resultDiv.innerHTML = `<p class="error">${err.message}</p>`;
  } finally {
    analyzeBtn.disabled = false;
    analyzeBtn.textContent = 'Analyze Leaf';
  }
});

function renderResult(data) {
  const p = data.prediction;
  const badgeClass = p.is_healthy ? 'healthy' : 'sick';
  const badgeText = p.is_healthy ? 'Healthy' : 'Disease Detected';
  resultDiv.innerHTML = `
    <span class="badge ${badgeClass}">${badgeText}</span>
    <dl>
      <dt>Crop</dt><dd>${p.crop}</dd>
      <dt>Diagnosis</dt><dd>${p.disease}</dd>
      <dt>Confidence</dt><dd>${(p.confidence * 100).toFixed(1)}%</dd>
      <dt>About</dt><dd>${p.description}</dd>
      <dt>Remedy</dt><dd>${p.remedy}</dd>
      <dt>Prevention</dt><dd>${p.prevention}</dd>
    </dl>
  `;
}
</script>
</body>
</html>
